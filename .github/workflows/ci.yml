name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift:
    name: Swift package
    runs-on: macos-latest
    timeout-minutes: 5
    env:
      PTK_CI_WINDOWSERVER_TEST_SKIP: >-
        PTKAppTests.(MenuBarControllerTests/(startCanShowPanelImmediatelyForAutomation|panelClosedUsesQuietCadenceSlowerThanAllUserIntervals|panelReopenRestoresNormalTenSecondCadenceAndRefreshes|panelSnapshotCanBeWrittenForAutomation|panelSnapshotCanRenderDockerContainerRowsForAutomation|settingsSnapshotCanBeWrittenForAutomation|buttonInteractionSnapshotCanBeWrittenForAutomation)|PanelAccessibilityTests/renderedDiagnosticRowIsTallerThanRenderedRegularRow)
      PTK_CI_PROCESS_TEST_SKIP: PTKCoreTests.ProcessRunnerTests

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Test package
        timeout-minutes: 3
        run: |
          swift test --filter PTKCoreTests --skip "$PTK_CI_PROCESS_TEST_SKIP"
          swift test --filter PTKAppTests --skip "$PTK_CI_WINDOWSERVER_TEST_SKIP"
        working-directory: macos

      - name: Build package
        run: swift build
        working-directory: macos

  repository-metadata:
    name: Repository metadata
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Check open-source readiness
        run: tests/open-source-readiness.sh

      - name: Check release readiness
        run: tests/release-readiness.sh

      - name: Check CI workflow readiness
        run: tests/ci-workflow-readiness.sh
